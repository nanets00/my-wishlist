<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的圖片願望清單 (終極優化版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .img-preview { object-fit: cover; width: 60px; height: 60px; border-radius: 8px; transition: transform 0.2s; }
        .img-preview:hover { transform: scale(1.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-zinc-100 min-h-screen py-10 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-8">
        
        <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6 text-sm space-y-3">
            <div class="flex items-center justify-between cursor-pointer" onclick="toggleSyncPanel()">
                <h3 class="font-bold text-amber-800 flex items-center gap-1.5">
                    ☁️ 雲端同步與自動壓縮優化
                </h3>
                <span id="sync-arrow" class="text-amber-600 font-bold">▶</span>
            </div>
            <div id="sync-panel" class="hidden space-y-3 pt-2 border-t border-amber-200/60">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-amber-700 mb-1">GitHub Token</label>
                        <input type="password" id="gh-token" class="w-full px-2.5 py-1.5 border border-amber-300 rounded bg-white outline-none text-xs" placeholder="ghp_xxxxxxxxxxxx">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-amber-700 mb-1">儲存庫名稱 (帳號/專案)</label>
                        <input type="text" id="gh-repo" class="w-full px-2.5 py-1.5 border border-amber-300 rounded bg-white outline-none text-xs" placeholder="name/repo">
                    </div>
                </div>
                <div class="flex gap-2 justify-end">
                    <button onclick="saveSyncSettings()" class="bg-amber-600 hover:bg-amber-700 text-white px-3 py-1.5 rounded text-xs font-medium transition">儲存並同步</button>
                </div>
                <p id="sync-status" class="text-xs text-zinc-500 text-right italic font-medium"></p>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b pb-6 mb-6 gap-4">
            <h1 class="text-2xl font-bold text-zinc-800 flex items-center gap-2">✨ 我的願望清單</h1>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-1.5 bg-zinc-100 p-1 rounded-lg border border-zinc-200">
                    <button type="button" id="btn-twd" onclick="setDefaultCurrency('TWD')" class="text-xs font-bold px-2.5 py-1 rounded-md transition">NT$</button>
                    <button type="button" id="btn-jpy" onclick="setDefaultCurrency('JPY')" class="text-xs font-bold px-2.5 py-1 rounded-md transition">¥</button>
                </div>
                <span id="total-count" class="text-zinc-500 text-sm font-medium">共 0 項</span>
            </div>
        </div>

        <form id="wish-form" class="space-y-4 mb-10 bg-zinc-50 p-5 rounded-xl border border-zinc-200">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-zinc-600 mb-1">商品名稱 *</label>
                    <input type="text" id="item-name" required class="w-full px-3 py-2 border border-zinc-300 rounded-lg outline-none text-sm" placeholder="想買什麼？">
                </div>
                <div class="w-full md:w-48">
                    <label class="block text-sm font-medium text-zinc-600 mb-1">預估金額</label>
                    <div class="flex gap-2 items-center">
                        <span id="item-currency-display" class="px-3 py-2 bg-zinc-200 text-zinc-700 rounded-lg text-sm font-bold min-w-[54px] text-center">NT$</span>
                        <input type="number" id="item-price" class="w-full px-3 py-2 border border-zinc-300 rounded-lg outline-none text-sm" placeholder="金額">
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-zinc-600 mb-1">商品圖片 (自動壓縮優化中)</label>
                    <div id="paste-zone" class="border-2 border-dashed border-zinc-300 bg-white rounded-lg p-2 text-center cursor-pointer hover:bg-zinc-100 transition flex flex-col items-center justify-center min-h-[85px]">
                        <p id="paste-hint" class="text-[11px] text-zinc-400">點擊或 Ctrl+V 貼上圖片</p>
                        <input type="file" id="item-image" accept="image/*" class="hidden">
                        <img id="form-img-preview" class="hidden w-10 h-10 object-cover rounded mt-1 border">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-600 mb-1">分類</label>
                    <select id="item-category" class="w-full px-3 py-2 border border-zinc-300 rounded-lg text-sm bg-white">
                        <option value="藥妝類">💄 藥妝類</option>
                        <option value="食物類">🍕 食物類</option>
                        <option value="玩具類">🧸 玩具類</option>
                        <option value="其他">📦 其他</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-4">
                <div class="w-24">
                    <label class="block text-sm font-medium text-zinc-600 mb-1">數量</label>
                    <input type="number" id="item-quantity" min="1" value="1" class="w-full px-3 py-2 border border-zinc-300 rounded-lg text-sm">
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-medium text-zinc-600 mb-1">備註</label>
                    <input type="text" id="item-note" class="w-full px-3 py-2 border border-zinc-300 rounded-lg text-sm" placeholder="備註...">
                </div>
            </div>

            <button type="submit" class="w-full bg-zinc-800 hover:bg-black text-white font-medium py-2.5 rounded-lg shadow-md transition">加入清單並備份</button>
        </form>

        <div class="flex border-b border-zinc-200 mb-4 overflow-x-auto no-scrollbar gap-1 text-sm">
            <button onclick="switchTab('all')" id="tab-all" class="px-4 py-2 font-bold border-b-2 border-black">全部</button>
            <button onclick="switchTab('藥妝類')" id="tab-藥妝類" class="px-4 py-2 text-zinc-500">💄 藥妝</button>
            <button onclick="switchTab('食物類')" id="tab-食物類" class="px-4 py-2 text-zinc-500">🍕 食物</button>
            <button onclick="switchTab('玩具類')" id="tab-玩具類" class="px-4 py-2 text-zinc-500">🧸 玩具</button>
            <button onclick="switchTab('其他')" id="tab-其他" class="px-4 py-2 text-zinc-500">📦 其他</button>
        </div>

        <div class="space-y-4" id="wish-list"></div>
    </div>

    <div id="image-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onclick="closeModal()">
        <img id="modal-img" class="max-w-full max-h-full rounded-lg shadow-2xl">
    </div>

    <script>
        let wishes = JSON.parse(localStorage.getItem('wishes_v7')) || [];
        let defaultCurrency = localStorage.getItem('default_currency') || 'TWD';
        let currentTab = 'all';
        let currentImageData = "";
        let cloudSha = "";

        const currencySymbols = {'TWD': 'NT$', 'JPY': '¥'};
        const categoryStyles = {
            '藥妝類': 'bg-pink-50 text-pink-700 border-pink-200',
            '食物類': 'bg-amber-50 text-amber-700 border-amber-200',
            '玩具類': 'bg-purple-50 text-purple-700 border-purple-200',
            '其他': 'bg-zinc-100 text-zinc-600 border-zinc-300'
        };

        // --- 圖片壓縮函式 ---
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const maxWidth = 800;
                        if (width > maxWidth) {
                            height = (maxWidth / width) * height;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        }

        // --- 核心：修正幣別切換 ---
        function setDefaultCurrency(currency) {
            defaultCurrency = currency;
            localStorage.setItem('default_currency', currency);
            
            const btnTwd = document.getElementById('btn-twd');
            const btnJpy = document.getElementById('btn-jpy');
            const formCurrencyDisplay = document.getElementById('item-currency-display');

            // 更新按鈕樣式
            if (currency === 'TWD') {
                btnTwd.className = "text-xs font-bold px-2.5 py-1 rounded-md bg-white text-zinc-800 shadow-sm border border-zinc-200/50";
                btnJpy.className = "text-xs font-bold px-2.5 py-1 rounded-md text-zinc-400 hover:text-zinc-600";
            } else {
                btnJpy.className = "text-xs font-bold px-2.5 py-1 rounded-md bg-white text-zinc-800 shadow-sm border border-zinc-200/50";
                btnTwd.className = "text-xs font-bold px-2.5 py-1 rounded-md text-zinc-400 hover:text-zinc-600";
            }

            // 更新表單顯示符號
            if (formCurrencyDisplay) formCurrencyDisplay.innerText = currencySymbols[currency];

            // 重新渲染清單，讓畫面上的總額符號跟著變
            renderWishes();
        }

        function toggleSyncPanel() {
            document.getElementById('sync-panel').classList.toggle('hidden');
            document.getElementById('sync-arrow').innerText = document.getElementById('sync-panel').classList.contains('hidden') ? "▶" : "▼";
        }

        async function uploadToCloud() {
            const token = localStorage.getItem('gh_token'), repo = localStorage.getItem('gh_repo');
            if(!token || !repo) return;
            const status = document.getElementById('sync-status');
            status.innerText = "⏳ 備份中...";
            try {
                const check = await fetch(`https://api.github.com/repos/${repo}/contents/wishdata.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if(check.ok) cloudSha = (await check.json()).sha;
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(wishes))));
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/wishdata.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "update", content, sha: cloudSha || undefined })
                });
                if(res.ok) status.innerText = "✅ 雲端已備份";
            } catch(e) { status.innerText = "❌ 備份失敗"; }
        }

        async function fetchFromCloud() {
            const token = localStorage.getItem('gh_token'), repo = localStorage.getItem('gh_repo');
            if(!token || !repo) return;
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/wishdata.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if(res.ok) {
                    const data = await res.json();
                    cloudSha = data.sha;
                    const json = decodeURIComponent(atob(data.content).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                    wishes = JSON.parse(json);
                    renderWishes();
                }
            } catch(e) {}
        }

        function renderWishes() {
            const list = document.getElementById('wish-list');
            list.innerHTML = '';
            const filtered = wishes.map((w, i) => ({...w, i})).filter(w => currentTab === 'all' || w.category === currentTab);
            
            filtered.forEach(wish => {
                const symbol = currencySymbols[wish.currency || defaultCurrency];
                const total = wish.price ? `${symbol} ${(wish.price * wish.quantity).toLocaleString()}` : '未填金額';
                const el = document.createElement('div');
                el.className = `flex items-center gap-4 p-4 rounded-xl border ${wish.bought ? 'bg-zinc-50 opacity-60' : 'bg-white shadow-sm'}`;
                el.innerHTML = `
                    <img src="${wish.image || 'https://via.placeholder.com/60'}" class="img-preview cursor-zoom-in" onclick="zoomImage('${wish.image}')">
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] font-bold mb-1"><span class="px-1.5 py-0.5 rounded border ${categoryStyles[wish.category] || categoryStyles['其他']}">${wish.category}</span></div>
                        <div class="flex items-center gap-2">
                            <input type="checkbox" ${wish.bought ? 'checked' : ''} onchange="toggleBought(${wish.i})" class="w-4 h-4 accent-emerald-600">
                            <span class="font-bold truncate ${wish.bought ? 'line-through text-zinc-400' : ''}">${wish.name}</span>
                        </div>
                        <div class="text-xs text-zinc-500 mt-1 pl-6">總額: <span class="text-emerald-600 font-bold">${total}</span></div>
                    </div>
                    <button onclick="deleteWish(${wish.i})" class="text-zinc-300 hover:text-red-500">🗑️</button>
                `;
                list.appendChild(el);
            });
            document.getElementById('total-count').innerText = `共 ${filtered.length} 項`;
        }

        document.getElementById('wish-form').onsubmit = async (e) => {
            e.preventDefault();
            wishes.push({
                name: document.getElementById('item-name').value,
                price: document.getElementById('item-price').value ? Number(document.getElementById('item-price').value) : null,
                currency: defaultCurrency,
                category: document.getElementById('item-category').value,
                quantity: Number(document.getElementById('item-quantity').value),
                note: document.getElementById('item-note').value,
                image: currentImageData,
                bought: false
            });
            localStorage.setItem('wishes_v7', JSON.stringify(wishes));
            renderWishes();
            await uploadToCloud();
            e.target.reset();
            currentImageData = "";
            document.getElementById('form-img-preview').classList.add('hidden');
            document.getElementById('paste-hint').innerText = "點擊或 Ctrl+V 貼上圖片";
        };

        // 貼上與上傳邏輯
        document.getElementById('paste-zone').onclick = () => document.getElementById('item-image').click();
        document.getElementById('item-image').onchange = async (e) => {
            if(e.target.files[0]) {
                currentImageData = await compressImage(e.target.files[0]);
                document.getElementById('form-img-preview').src = currentImageData;
                document.getElementById('form-img-preview').classList.remove('hidden');
                document.getElementById('paste-hint').innerText = "⚡ 已自動壓縮";
            }
        };
        window.onpaste = async (e) => {
            const item = Array.from(e.clipboardData.items).find(i => i.type.indexOf('image') !== -1);
            if(item) {
                currentImageData = await compressImage(item.getAsFile());
                document.getElementById('form-img-preview').src = currentImageData;
                document.getElementById('form-img-preview').classList.remove('hidden');
                document.getElementById('paste-hint').innerText = "⚡ 已貼上並壓縮";
            }
        };

        function toggleBought(i) { wishes[i].bought = !wishes[i].bought; saveAndRender(); }
        function deleteWish(i) { if(confirm('確定刪除？')) { wishes.splice(i, 1); saveAndRender(); } }
        function saveAndRender() { localStorage.setItem('wishes_v7', JSON.stringify(wishes)); renderWishes(); uploadToCloud(); }
        function switchTab(t) { 
            currentTab = t; 
            ['all', '藥妝類', '食物類', '玩具類', '其他'].forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                btn.className = (tab === t) ? "px-4 py-2 font-bold border-b-2 border-black" : "px-4 py-2 text-zinc-500";
            });
            renderWishes(); 
        }
        function zoomImage(s) { if(s) { document.getElementById('modal-img').src = s; document.getElementById('image-modal').classList.remove('hidden'); } }
        function closeModal() { document.getElementById('image-modal').classList.add('hidden'); }
        function saveSyncSettings() {
            localStorage.setItem('gh_token', document.getElementById('gh-token').value.trim());
            localStorage.setItem('gh_repo', document.getElementById('gh-repo').value.trim());
            fetchFromCloud();
        }

        // 初始化
        document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
        document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
        setDefaultCurrency(defaultCurrency);
        fetchFromCloud();
    </script>
</body>
</html>
