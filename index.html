<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的雲端願望清單 (Firebase 版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .img-preview { object-fit: cover; width: 60px; height: 60px; border-radius: 8px; }
    </style>
</head>
<body class="bg-zinc-100 min-h-screen py-10 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-8">
        
        <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b pb-6 mb-6 gap-4">
            <h1 class="text-2xl font-bold text-zinc-800">✨ 雲端願望清單</h1>
            <div class="flex items-center gap-2 bg-zinc-100 p-1 rounded-lg border border-zinc-200 text-xs font-bold">
                <button id="btn-TWD" onclick="changeCurrency('TWD')" class="px-2.5 py-1 rounded-md">NT$</button>
                <button id="btn-JPY" onclick="changeCurrency('JPY')" class="px-2.5 py-1 rounded-md">¥</button>
            </div>
        </div>

        <form id="wish-form" class="space-y-4 mb-10 bg-zinc-50 p-5 rounded-xl border border-zinc-200">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-zinc-600 mb-1">商品名稱 *</label>
                    <input type="text" id="item-name" required class="w-full px-3 py-2 border border-zinc-300 rounded-lg text-sm" placeholder="想買什麼？">
                </div>
                <div class="w-full md:w-40">
                    <label class="block text-sm font-medium text-zinc-600 mb-1">預估金額</label>
                    <input type="number" id="item-price" class="w-full px-3 py-2 border border-zinc-300 rounded-lg text-sm" placeholder="金額">
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-zinc-600 mb-1">商品圖片</label>
                    <input type="file" id="item-image" accept="image/*" class="w-full text-xs">
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-600 mb-1">分類</label>
                    <select id="item-category" class="w-full px-3 py-2 border border-zinc-300 rounded-lg text-sm">
                        <option value="藥妝類">💄 藥妝類</option>
                        <option value="食物類">🍕 食物類</option>
                        <option value="玩具類">🧸 玩具類</option>
                        <option value="其他">📦 其他</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-zinc-800 hover:bg-black text-white font-medium py-2.5 rounded-lg transition">存入雲端資料庫</button>
        </form>

        <div id="wish-list" class="space-y-4">
            <p class="text-center text-zinc-400 py-10">讀取中...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // 1. 這裡貼上你的 Firebase Config
        const firebaseConfig = {
  apiKey: "AIzaSyAMEvxdgaRx-sJBgGBPCL2ZKJ-bbyN0oJs",
  authDomain: "mywishlist-d04b4.firebaseapp.com",
  projectId: "mywishlist-d04b4",
  storageBucket: "mywishlist-d04b4.firebasestorage.app",
  messagingSenderId: "682898028986",
  appId: "1:682898028986:web:3efed38d9645c42f0a0583",
  measurementId: "G-BB5TRK837X"

        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        let currentCurrency = localStorage.getItem('pref_currency') || 'TWD';

        // 2. 監聽資料庫 (這就是 Realtime 即時更新！)
        const q = query(collection(db, "wishes"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('wish-list');
            list.innerHTML = '';
            
            snapshot.forEach((docSnap) => {
                const wish = docSnap.data();
                const id = docSnap.id;
                const symbol = wish.currency === 'TWD' ? 'NT$' : '¥';
                
                const el = document.createElement('div');
                el.className = `flex items-center gap-4 p-4 rounded-xl border bg-white shadow-sm ${wish.bought ? 'opacity-50' : ''}`;
                el.innerHTML = `
                    <img src="${wish.imageUrl || 'https://via.placeholder.com/60'}" class="img-preview">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" ${wish.bought ? 'checked' : ''} onchange="window.updateStatus('${id}', ${wish.bought})" class="w-4 h-4">
                            <span class="font-bold truncate ${wish.bought ? 'line-through' : ''}">${wish.name}</span>
                        </div>
                        <div class="text-xs text-zinc-500 mt-1">${symbol} ${wish.price || 0}</div>
                    </div>
                    <button onclick="window.deleteItem('${id}')" class="text-zinc-300 hover:text-red-500 text-lg">🗑️</button>
                `;
                list.appendChild(el);
            });
            if(snapshot.empty) list.innerHTML = '<p class="text-center text-zinc-400 py-10">目前沒有願望</p>';
        });

        // 3. 表單提交 (含圖片上傳)
        document.getElementById('wish-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "上傳中...";

            const file = document.getElementById('item-image').files[0];
            let imageUrl = "";

            if (file) {
                const storageRef = ref(storage, 'wishes/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                imageUrl = await getDownloadURL(storageRef);
            }

            await addDoc(collection(db, "wishes"), {
                name: document.getElementById('item-name').value,
                price: Number(document.getElementById('item-price').value),
                category: document.getElementById('item-category').value,
                currency: currentCurrency,
                imageUrl: imageUrl,
                bought: false,
                createdAt: new Date()
            });

            e.target.reset();
            btn.disabled = false;
            btn.innerText = "存入雲端資料庫";
        };

        // 4. 全域函式 (讓 HTML 按鈕可以呼叫)
        window.deleteItem = async (id) => {
            if(confirm('確定刪除？')) await deleteDoc(doc(db, "wishes", id));
        };

        window.updateStatus = async (id, currentStatus) => {
            await updateDoc(doc(db, "wishes", id), { bought: !currentStatus });
        };

        window.changeCurrency = (cur) => {
            currentCurrency = cur;
            localStorage.setItem('pref_currency', cur);
            document.querySelectorAll('[id^="btn-"]').forEach(b => b.className = "px-2.5 py-1 rounded-md");
            document.getElementById('btn-' + cur).className = "px-2.5 py-1 rounded-md bg-white text-zinc-800 shadow-sm border border-zinc-200/50";
        };

        window.changeCurrency(currentCurrency);
    </script>
</body>
</html>
