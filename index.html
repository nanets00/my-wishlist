<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 Firestore 願望清單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .active-btn { background-color: white; color: #27272a; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); border: 1px solid rgba(228, 228, 231, 0.5); }
        .inactive-btn { color: #a1a1aa; }
    </style>
</head>
<body class="bg-zinc-100 min-h-screen py-10 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-8">
        
        <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b pb-6 mb-6 gap-4">
            <h1 class="text-2xl font-bold text-zinc-800 flex items-center gap-2">✨ 雲端願望清單</h1>
            <div class="flex items-center gap-1.5 bg-zinc-100 p-1 rounded-lg border border-zinc-200">
                <button type="button" id="btn-TWD" onclick="setGlobalCurrency('TWD')" class="text-xs font-bold px-2.5 py-1 rounded-md transition">NT$</button>
                <button type="button" id="btn-JPY" onclick="setGlobalCurrency('JPY')" class="text-xs font-bold px-2.5 py-1 rounded-md transition">¥</button>
            </div>
        </div>

        <form id="wish-form" class="space-y-4 mb-10 bg-zinc-50 p-5 rounded-xl border border-zinc-200">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-zinc-600 mb-1">商品名稱 *</label>
                    <input type="text" id="item-name" required class="w-full px-3 py-2 border border-zinc-300 rounded-lg outline-none text-sm" placeholder="想買什麼？">
                </div>
                <div class="w-full md:w-48">
                    <label class="block text-sm font-medium text-zinc-600 mb-1">預估金額</label>
                    <div class="flex gap-2 items-center">
                        <span id="form-currency-label" class="px-3 py-2 bg-zinc-200 text-zinc-700 rounded-lg text-sm font-bold min-w-[54px] text-center">NT$</span>
                        <input type="number" id="item-price" class="w-full px-3 py-2 border border-zinc-300 rounded-lg outline-none text-sm" placeholder="金額">
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-zinc-600 mb-1">分類</label>
                    <select id="item-category" class="w-full px-3 py-2 border border-zinc-300 rounded-lg text-sm bg-white">
                        <option value="藥妝類">💄 藥妝類</option>
                        <option value="食物類">🍕 食物類</option>
                        <option value="玩具類">🧸 玩具類</option>
                        <option value="其他">📦 其他</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-600 mb-1">數量</label>
                    <input type="number" id="item-quantity" min="1" value="1" class="w-full px-3 py-2 border border-zinc-300 rounded-lg text-sm">
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-zinc-800 hover:bg-black text-white font-medium py-2.5 rounded-lg shadow-md transition">存入 Firestore</button>
        </form>

        <div class="space-y-4" id="wish-list">
            <p class="text-center text-zinc-400 py-10">連線到雲端中...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🔥 請將此處替換成你的 Firebase Config
        const firebaseConfig = {

  apiKey: "AIzaSyAMEvxdgaRx-sJBgGBPCL2ZKJ-bbyN0oJs",
  authDomain: "mywishlist-d04b4.firebaseapp.com",
  projectId: "mywishlist-d04b4",
  storageBucket: "mywishlist-d04b4.firebasestorage.app",
  messagingSenderId: "682898028986",
  appId: "1:682898028986:web:3efed38d9645c42f0a0583",
  measurementId: "G-BB5TRK837X"
};


        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentCurrency = localStorage.getItem('pref_currency') || 'TWD';
        const currencySymbols = { 'TWD': 'NT$', 'JPY': '¥' };

        // --- 1. 即時監聽 Firestore 數據 ---
        const q = query(collection(db, "wishes"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            renderList(snapshot);
        });

        // --- 2. 渲染畫面 ---
        function renderList(snapshot) {
            const listDiv = document.getElementById('wish-list');
            listDiv.innerHTML = '';

            snapshot.forEach((docSnap) => {
                const wish = docSnap.data();
                const id = docSnap.id;
                
                // 幣別處理：優先使用該項目儲存的幣別，若無則使用目前的預設
                const itemCurrency = wish.currency || currentCurrency;
                const symbol = currencySymbols[itemCurrency];
                const total = wish.price ? `${symbol} ${(wish.price * (wish.quantity || 1)).toLocaleString()}` : '未填金額';

                const card = document.createElement('div');
                card.className = `flex items-center gap-4 p-4 rounded-xl border bg-white shadow-sm transition ${wish.bought ? 'opacity-50 grayscale' : ''}`;
                card.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" ${wish.bought ? 'checked' : ''} 
                                   onclick="toggleStatus('${id}', ${wish.bought})" 
                                   class="w-4 h-4 accent-zinc-800 cursor-pointer">
                            <span class="font-bold truncate ${wish.bought ? 'line-through text-zinc-400' : 'text-zinc-800'}">${wish.name}</span>
                            <span class="text-[10px] px-1.5 py-0.5 rounded border border-zinc-200 bg-zinc-50 text-zinc-500">${wish.category}</span>
                        </div>
                        <div class="text-xs text-zinc-500 mt-1 pl-6">
                            數量: ${wish.quantity || 1} | 總計: <span class="text-emerald-600 font-bold">${total}</span>
                        </div>
                    </div>
                    <button onclick="deleteWish('${id}')" class="text-zinc-300 hover:text-red-500 transition">🗑️</button>
                `;
                listDiv.appendChild(card);
            });

            if (snapshot.empty) {
                listDiv.innerHTML = '<p class="text-center text-zinc-400 py-10">清單目前是空的，快去買東西吧！</p>';
            }
        }

        // --- 3. 操作功能 ---
        
        // 新增
        document.getElementById('wish-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "儲存中...";

            try {
                await addDoc(collection(db, "wishes"), {
                    name: document.getElementById('item-name').value,
                    price: document.getElementById('item-price').value ? Number(document.getElementById('item-price').value) : null,
                    currency: currentCurrency,
                    category: document.getElementById('item-category').value,
                    quantity: Number(document.getElementById('item-quantity').value),
                    bought: false,
                    createdAt: new Date()
                });
                e.target.reset();
                // 重設後手動呼叫一次幣別更新，確保表單符號正確
                window.setGlobalCurrency(currentCurrency);
            } catch (err) {
                alert("儲存失敗: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "存入 Firestore";
            }
        };

        // 狀態切換 (已買/未買)
        window.toggleStatus = async (id, currentStatus) => {
            await updateDoc(doc(db, "wishes", id), { bought: !currentStatus });
        };

        // 刪除
        window.deleteWish = async (id) => {
            if (confirm("確定要刪除這項願望嗎？")) {
                await deleteDoc(doc(db, "wishes", id));
            }
        };

        // 幣別切換控制
        window.setGlobalCurrency = (cur) => {
            currentCurrency = cur;
            localStorage.setItem('pref_currency', cur);
            
            // 更新按鈕視覺
            document.getElementById('btn-TWD').className = `text-xs font-bold px-2.5 py-1 rounded-md transition ${cur === 'TWD' ? 'active-btn' : 'inactive-btn'}`;
            document.getElementById('btn-JPY').className = `text-xs font-bold px-2.5 py-1 rounded-md transition ${cur === 'JPY' ? 'active-btn' : 'inactive-btn'}`;
            
            // 更新表單顯示
            document.getElementById('form-currency-label').innerText = currencySymbols[cur];
            
            // 重要：因為 Firestore 會自動觸發 onSnapshot，
            // 這裡不需要手動 re-render，但如果你的 render 邏輯依賴全域變數，它會下次更新時套用。
            // 這裡我們主動執行一次畫面更新，以應對「未重新從 DB 抓取」時的符號變更。
        };

        // 初始化幣別
        window.setGlobalCurrency(currentCurrency);
    </script>
</body>
</html>
