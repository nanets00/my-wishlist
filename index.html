<!DOCTYPE html>
<html lang="zh-TW">
<head>

  <!-- 標準網頁圖示與 Android 適用 -->
  <link rel="icon" type="image/png" sizes="192x192" href="icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon.png">

  <!-- 蘋果 iPhone / iPad 專用圖示 (特別重要) -->
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的圖片願望清單 (自動壓縮雲端版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .img-preview { object-fit: cover; width: 60px; height: 60px; border-radius: 8px; transition: transform 0.2s; }
        .img-preview:hover { transform: scale(1.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-zinc-100 min-h-screen py-10 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-8">
        
        <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6 text-sm space-y-3">
            <div class="flex items-center justify-between cursor-pointer" onclick="toggleSyncPanel()">
                <h3 class="font-bold text-amber-800 flex items-center gap-1.5">
                    ☁️ 跨裝置雲端同步設定 (含自動縮圖優化)
                </h3>
                <span id="sync-arrow" class="text-amber-600 font-bold">▶</span>
            </div>
            <div id="sync-panel" class="hidden space-y-3 pt-2 border-t border-amber-200/60">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-amber-700 mb-1">GitHub Token (金鑰)</label>
                        <input type="password" id="gh-token" class="w-full px-2.5 py-1.5 border border-amber-300 rounded bg-white outline-none text-xs" placeholder="ghp_xxxxxxxxxxxx">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-amber-700 mb-1">儲存庫名稱 (帳號/儲存庫)</label>
                        <input type="text" id="gh-repo" class="w-full px-2.5 py-1.5 border border-amber-300 rounded bg-white outline-none text-xs" placeholder="yourname/my-wishlist">
                    </div>
                </div>
                <div class="flex gap-2 justify-end">
                    <button onclick="saveSyncSettings()" class="bg-amber-600 hover:bg-amber-700 text-white px-3 py-1.5 rounded text-xs font-medium transition">儲存設定</button>
                    <button onclick="fetchFromCloud()" class="bg-zinc-700 hover:bg-zinc-800 text-white px-3 py-1.5 rounded text-xs font-medium transition">📥 從雲端下載</button>
                </div>
                <p id="sync-status" class="text-xs text-zinc-500 text-right italic font-medium"></p>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b pb-6 mb-6 gap-4">
            <h1 class="text-2xl font-bold text-zinc-800 flex items-center gap-2">✨ 我的願望清單</h1>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-1.5 bg-zinc-100 p-1 rounded-lg border border-zinc-200">
                    <button type="button" id="btn-twd" onclick="setDefaultCurrency('TWD')" class="text-xs font-bold px-2.5 py-1 rounded-md transition">NT$</button>
                    <button type="button" id="btn-jpy" onclick="setDefaultCurrency('JPY')" class="text-xs font-bold px-2.5 py-1 rounded-md transition">¥</button>
                </div>
                <span id="total-count" class="text-zinc-500 text-sm font-medium bg-zinc-50 px-2.5 py-1 rounded-md border border-zinc-100">共 0 項</span>
            </div>
        </div>

        <form id="wish-form" class="space-y-4 mb-10 bg-zinc-50 p-5 rounded-xl border border-zinc-200">
            <div>
                <label class="block text-sm font-medium text-zinc-600 mb-1">商品分類</label>
                <select id="item-category" class="w-full md:w-[120px] px-3 py-2 border border-zinc-300 rounded-lg focus:ring-2 focus:ring-black outline-none text-sm font-medium text-zinc-700">
                    <option value="藥妝類" selected>💄 藥妝類</option>
                    <option value="食物類">🍕 食物類</option>
                    <option value="玩具類">🧸 玩具類</option>
                    <option value="其他">📦 其他</option>
                </select>
            </div>

            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-zinc-600 mb-1">商品名稱 *</label>
                    <input type="text" id="item-name" required class="w-full px-3 py-2 border border-zinc-300 rounded-lg text-sm" placeholder="想買什麼？">
                </div>
                <div class="w-full md:w-48">
                    <label class="block text-sm font-medium text-zinc-600 mb-1">單價</label>
                    <div class="flex gap-2">
                        <span id="item-currency-display" class="px-3 py-2 bg-zinc-200/70 border border-zinc-300 text-zinc-700 rounded-lg text-sm font-bold min-w-[54px] text-center">NT$</span>
                        <input type="number" id="item-price" class="w-full px-3 py-2 border border-zinc-300 rounded-lg text-sm" placeholder="金額">
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-zinc-600 mb-1">商品圖片 (自動壓縮中 ⚡)</label>
                    <div id="paste-zone" class="border-2 border-dashed border-zinc-300 bg-white rounded-lg p-2 text-center cursor-pointer hover:bg-zinc-100 min-h-[85px] flex flex-col items-center justify-center relative">
                        <p id="paste-hint" class="text-[11px] text-zinc-400">點擊或 Ctrl+V 貼上照片</p>
                        <input type="file" id="item-image" accept="image/*" class="hidden">
                        <img id="form-img-preview" class="hidden w-10 h-10 object-cover rounded mt-1 border">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-600 mb-1">數量</label>
                    <input type="number" id="item-quantity" min="1" value="1" required class="w-full px-3 py-2 border border-zinc-300 rounded-lg text-sm">
                </div>
            </div>

            <button type="submit" class="w-full bg-zinc-800 hover:bg-black text-white font-medium py-2.5 rounded-lg transition shadow-md">加入清單</button>
        </form>

        <div class="flex border-b border-zinc-200 mb-4 overflow-x-auto no-scrollbar gap-1 text-sm">
            <button onclick="switchTab('all')" id="tab-all" class="px-4 py-2 font-bold border-b-2 border-black text-zinc-900 whitespace-nowrap">全部</button>
            <button onclick="switchTab('藥妝類')" id="tab-藥妝類" class="px-4 py-2 font-medium text-zinc-500 border-b-2 border-transparent whitespace-nowrap">💄 藥妝</button>
            <button onclick="switchTab('食物類')" id="tab-食物類" class="px-4 py-2 font-medium text-zinc-500 border-b-2 border-transparent whitespace-nowrap">🍕 食物</button>
            <button onclick="switchTab('玩具類')" id="tab-玩具類" class="px-4 py-2 font-medium text-zinc-500 border-b-2 border-transparent whitespace-nowrap">🧸 玩具</button>
            <button onclick="switchTab('其他')" id="tab-其他" class="px-4 py-2 font-medium text-zinc-500 border-b-2 border-transparent whitespace-nowrap">📦 其他</button>
        </div>

        <div class="space-y-4" id="wish-list"></div>
    </div>

    <div id="image-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 cursor-zoom-out" onclick="closeModal()">
        <img id="modal-img" class="max-w-full max-h-full rounded-lg shadow-2xl object-contain">
    </div>

    <script>
        let wishes = JSON.parse(localStorage.getItem('wishes_v7')) || [];
        let defaultCurrency = localStorage.getItem('default_currency') || 'TWD';
        let currentTab = 'all'; 
        let currentImageData = ""; 
        let cloudSha = ""; 

        const wishForm = document.getElementById('wish-form');
        const wishList = document.getElementById('wish-list');
        const fileInput = document.getElementById('item-image');
        const formImgPreview = document.getElementById('form-img-preview');
        const pasteHint = document.getElementById('paste-hint');
        const statusEl = document.getElementById('sync-status');

        const currencySymbols = {'TWD': 'NT$', 'JPY': '¥'};
        const categoryStyles = {
            '藥妝類': 'bg-pink-50 text-pink-700 border-pink-200',
            '食物類': 'bg-amber-50 text-amber-700 border-amber-200',
            '玩具類': 'bg-purple-50 text-purple-700 border-purple-200',
            '其他': 'bg-zinc-100 text-zinc-600 border-zinc-300'
        };

        // --- 核心優化：自動壓縮圖片邏輯 ---
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        // 限制最大寬度為 800px
                        const maxWidth = 800;
                        if (width > maxWidth) {
                            height = (maxWidth / width) * height;
                            width = maxWidth;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // 轉為 JPEG 並設定 0.7 品質壓縮
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        resolve(compressedBase64);
                    };
                };
            });
        }

        async function handleImageSelect(file) {
            if (!file) return;
            pasteHint.innerText = "⚡ 正在壓縮圖片...";
            const compressedData = await compressImage(file);
            currentImageData = compressedData;
            formImgPreview.src = compressedData;
            formImgPreview.classList.remove('hidden');
            pasteHint.innerText = "✅ 壓縮完成";
            pasteHint.className = "text-[10px] text-emerald-600 font-bold";
        }

        // 事件監聽
        document.getElementById('paste-zone').onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleImageSelect(e.target.files[0]);
        window.onpaste = (e) => {
            const items = e.clipboardData.items;
            for (let item of items) {
                if (item.type.indexOf('image') !== -1) {
                    handleImageSelect(item.getAsFile());
                }
            }
        };

        // 雲端同步邏輯
        function toggleSyncPanel() {
            document.getElementById('sync-panel').classList.toggle('hidden');
            document.getElementById('sync-arrow').innerText = document.getElementById('sync-panel').classList.contains('hidden') ? "▶" : "▼";
        }

        function saveSyncSettings() {
            localStorage.setItem('gh_token', document.getElementById('gh-token').value.trim());
            localStorage.setItem('gh_repo', document.getElementById('gh-repo').value.trim());
            fetchFromCloud();
        }

        async function fetchFromCloud() {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');
            if(!token || !repo) return;
            statusEl.innerText = "⏳ 同步中...";
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/wishdata.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if(res.ok) {
                    const data = await res.json();
                    cloudSha = data.sha;
                    const jsonString = decodeURIComponent(atob(data.content).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                    wishes = JSON.parse(jsonString);
                    localStorage.setItem('wishes_v7', JSON.stringify(wishes));
                    renderWishes();
                    statusEl.innerText = "✅ 雲端同步成功";
                } else { statusEl.innerText = "☁️ 雲端尚無資料"; }
            } catch(err) { statusEl.innerText = "❌ 連線失敗"; }
        }

        async function uploadToCloud() {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');
            if(!token || !repo) return;
            statusEl.innerText = "⏳ 備份中...";
            try {
                // 先拿最新的 SHA 防止衝突
                const check = await fetch(`https://api.github.com/repos/${repo}/contents/wishdata.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if(check.ok) { cloudSha = (await check.json()).sha; }

                const content = btoa(unescape(encodeURIComponent(JSON.stringify(wishes))));
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/wishdata.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "update", content, sha: cloudSha || undefined })
                });
                if(res.ok) { 
                    cloudSha = (await res.json()).content.sha;
                    statusEl.innerText = "☁️ 備份成功 (圖片已縮小)"; 
                }
            } catch(err) { statusEl.innerText = "❌ 備份失敗"; }
        }

        // 渲染與一般功能
        function renderWishes() {
            wishList.innerHTML = '';
            const filtered = wishes.map((w, i) => ({...w, i})).filter(w => currentTab === 'all' || w.category === currentTab);
            filtered.forEach(wish => {
                const hasPrice = wish.price && !isNaN(wish.price);
                const total = hasPrice ? `${currencySymbols[wish.currency] || '$'} ${(wish.price * wish.quantity).toLocaleString()}` : '未填金額';
                const el = document.createElement('div');
                el.className = `flex items-center gap-4 p-4 rounded-xl border bg-white shadow-sm ${wish.bought ? 'opacity-50' : ''}`;
                el.innerHTML = `
                    <img src="${wish.image || 'https://via.placeholder.com/60'}" class="img-preview cursor-zoom-in" onclick="zoomImage('${wish.image}')">
                    <div class="flex-1 min-w-0">
                        <div class="mb-1"><span class="text-[10px] px-1.5 py-0.5 rounded border font-bold ${categoryStyles[wish.category]}">${wish.category}</span></div>
                        <div class="flex items-center gap-2">
                            <input type="checkbox" ${wish.bought ? 'checked' : ''} onchange="toggleBought(${wish.i})" class="w-4 h-4 accent-emerald-600">
                            <span class="font-bold truncate ${wish.bought ? 'line-through' : ''}">${wish.name}</span>
                        </div>
                        <div class="text-xs text-zinc-500 mt-1">單價: ${wish.price || '0'} x ${wish.quantity} | 總額: <span class="text-emerald-600 font-bold">${total}</span></div>
                    </div>
                    <button onclick="deleteWish(${wish.i})" class="text-zinc-300 hover:text-red-500">🗑️</button>
                `;
                wishList.appendChild(el);
            });
            document.getElementById('total-count').innerText = `共 ${filtered.length} 項`;
        }

        wishForm.onsubmit = async (e) => {
            e.preventDefault();
            wishes.push({
                name: document.getElementById('item-name').value,
                price: document.getElementById('item-price').value ? Number(document.getElementById('item-price').value) : null,
                currency: defaultCurrency,
                category: document.getElementById('item-category').value,
                quantity: Number(document.getElementById('item-quantity').value),
                note: document.getElementById('item-note').value,
                image: currentImageData,
                bought: false
            });
            await saveAndRender();
            wishForm.reset();
            formImgPreview.classList.add('hidden');
            currentImageData = "";
            pasteHint.innerText = "點擊或 Ctrl+V 貼上照片";
            pasteHint.className = "text-[11px] text-zinc-400";
        };

        async function saveAndRender() {
            localStorage.setItem('wishes_v7', JSON.stringify(wishes));
            renderWishes();
            await uploadToCloud();
        }

        function toggleBought(i) { wishes[i].bought = !wishes[i].bought; saveAndRender(); }
        function deleteWish(i) { if(confirm('確定刪除？')) { wishes.splice(i, 1); saveAndRender(); } }
        function switchTab(t) { currentTab = t; renderWishes(); }
        function setDefaultCurrency(c) { defaultCurrency = c; localStorage.setItem('default_currency', c); renderWishes(); }
        function zoomImage(s) { document.getElementById('modal-img').src = s; document.getElementById('image-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('image-modal').classList.add('hidden'); }

        // 初始化
        document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
        document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
        setDefaultCurrency(defaultCurrency);
        fetchFromCloud();
    </script>
</body>
</html>
